<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Redirecting - pinyu.ai</title>
<link rel="canonical" href="https://pinyu.ai/">
<style>
  :root {
    --bg: #FAF6EE;
    --text-1: #1A1714;
    --text-2: #5C5349;
    --border: #E5DDD0;
    --accent: #1B3F8B;
    --serif: 'EB Garamond', 'Songti SC', Georgia, serif;
    --sans: 'Inter', -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--bg);
    color: var(--text-1);
    font-family: var(--sans);
  }

  main {
    width: 100%;
    max-width: 420px;
    padding: 28px 24px;
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.72);
  }

  h1 {
    margin: 0 0 10px;
    font-family: var(--serif);
    font-size: 1.6rem;
    font-weight: 400;
  }

  p {
    margin: 0;
    color: var(--text-2);
    font-size: 0.92rem;
    line-height: 1.65;
  }

  a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid rgba(27, 63, 139, 0.2);
  }
</style>
</head>
<body>
<main>
  <h1>News moved home.</h1>
  <p>If you are not redirected automatically, <a id="redirect-link" href="./">open the homepage</a>.</p>
</main>

<script>
  const target = `${window.location.search || ""}${window.location.hash || ""}`
    ? `./${window.location.search || ""}${window.location.hash || ""}`
    : "./";

  document.getElementById("redirect-link").href = target;
  window.location.replace(target);
</script>
</body>
</html>
